<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Jenks Family Medicine</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/png">
    <style>
        body {
            background-color: var(--bg-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .admin-help-wrapper {
            width: 100%;
            max-width: 460px;
            padding: 1.5rem;
        }

        .admin-help-card {
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            padding: 2.5rem;
            text-align: center;
        }

        .admin-help-card .logo-img {
            height: 60px;
            margin: 0 auto 1.5rem;
        }

        .admin-help-card h1 {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            color: var(--accent-color);
        }

        .admin-help-card p {
            color: var(--text-light);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.25rem;
        }

        .admin-help-card a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
        }

        .admin-help-card a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="admin-help-wrapper">
        <div class="admin-help-card">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Jenks Family Medicine" class="logo-img">
            <h1>Forgot Password?</h1>
            <p>
                Ask an Owner to reset your staff password from the Admin Dashboard under User Access.
                You will be required to choose a new password after signing in with the temporary one.
            </p>
            <p><a href="{{ url_for('admin_login') }}">Back to sign in</a></p>
        </div>
    </div>
</body>

</html>
